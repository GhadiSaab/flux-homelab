apiVersion: v1
kind: ConfigMap
metadata:
  name: zepp-md-exporter-script
  namespace: zepp
data:
  export.py: |
    #!/usr/bin/env python3

    import os
    from datetime import datetime
    from influxdb_client import InfluxDBClient

    URL         = os.getenv("INFLUXDB_URL", "http://influxdb.influxdb.svc.cluster.local")
    TOKEN       = os.getenv("INFLUXDB_TOKEN", "")
    ORG         = os.getenv("INFLUXDB_ORG", "homelab")
    BUCKET      = os.getenv("INFLUXDB_BUCKET", "zepp")
    MEASUREMENT = os.getenv("INFLUXDB_MEASUREMENT", "zepp")
    OUTPUT_DIR  = "/health-data"
    RANGE       = os.getenv("EXPORT_RANGE", "-30d")

    def run_query(client, flux):
        try:
            return client.query_api().query(flux, org=ORG)
        except Exception as e:
            print(f"Query error: {e}")
            return []

    def fmt_date(dt):
        return dt.strftime("%Y-%m-%d")

    def fmt_min(m):
        if m is None:
            return "N/A"
        h, mi = divmod(int(m), 60)
        return f"{h}h{mi:02d}m"

    def write_md(filename, content):
        path = os.path.join(OUTPUT_DIR, filename)
        with open(path, "w") as f:
            f.write(content)
        print(f"Written {path}")

    def export_heart_rate(client):
        base = f'from(bucket: "{BUCKET}") |> range(start: {RANGE}) |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r._field == "heart_rate")'

        avg_res, min_res, max_res, rest_res = {}, {}, {}, {}

        for table in run_query(client, base + ' |> filter(fn: (r) => r["hr_measure"] == "periodic") |> aggregateWindow(every: 1d, fn: mean, createEmpty: false)'):
            for r in table.records:
                avg_res[fmt_date(r.get_time())] = round(r.get_value(), 1)

        for table in run_query(client, base + ' |> filter(fn: (r) => r["hr_measure"] == "periodic") |> aggregateWindow(every: 1d, fn: min, createEmpty: false)'):
            for r in table.records:
                min_res[fmt_date(r.get_time())] = int(r.get_value())

        for table in run_query(client, base + ' |> filter(fn: (r) => r["hr_measure"] == "periodic") |> aggregateWindow(every: 1d, fn: max, createEmpty: false)'):
            for r in table.records:
                max_res[fmt_date(r.get_time())] = int(r.get_value())

        for table in run_query(client, base + ' |> filter(fn: (r) => r["hr_state"] == "resting")'):
            for r in table.records:
                rest_res[fmt_date(r.get_time())] = int(r.get_value())

        dates = sorted(set(list(avg_res) + list(rest_res)), reverse=True)
        lines = ["# Heart Rate\n\n", "| Date | Avg BPM | Min BPM | Max BPM | Resting BPM |\n", "|------|---------|---------|---------|-------------|\n"]
        for d in dates:
            lines.append(f"| {d} | {avg_res.get(d,'N/A')} | {min_res.get(d,'N/A')} | {max_res.get(d,'N/A')} | {rest_res.get(d,'N/A')} |\n")
        write_md("heart_rate.md", "".join(lines))

    def export_steps(client):
        flux = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r.activity_type == "steps")
      |> filter(fn: (r) => r._field == "total_steps" or r._field == "distance_m" or r._field == "calories")
      |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
      |> sort(columns: ["_time"], desc: true)
    '''
        lines = ["# Steps & Activity\n\n", "| Date | Steps | Distance (m) | Calories |\n", "|------|-------|--------------|----------|\n"]
        seen = set()
        for table in run_query(client, flux):
            for r in table.records:
                d = fmt_date(r.get_time())
                if d in seen:
                    continue
                seen.add(d)
                lines.append(f"| {d} | {int(r.values.get('total_steps',0)):,} | {int(r.values.get('distance_m',0)):,} | {int(r.values.get('calories',0))} |\n")
        write_md("steps.md", "".join(lines))

    def export_sleep(client):
        # total = (slept_to - slept_from) - awake stage minutes
        # rem_sleep_min is mislabeled in source — it's actually light sleep
        flux_summary = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r.activity_type == "sleep")
      |> filter(fn: (r) => r._field == "slept_from" or r._field == "slept_to" or r._field == "deep_sleep_min" or r._field == "rem_sleep_min")
      |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
      |> sort(columns: ["_time"], desc: true)
    '''
        flux_awake = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r.activity_type == "sleep_stage" and r.sleep_type == "awake" and r._field == "total_sleep_min")
      |> aggregateWindow(every: 1d, fn: sum, createEmpty: false, timeSrc: "_start")
      |> sort(columns: ["_time"], desc: true)
    '''
        awake_by_day = {}
        for table in run_query(client, flux_awake):
            for r in table.records:
                awake_by_day[fmt_date(r.get_time())] = int(r.get_value())

        lines = ["# Sleep\n\n", "| Date | Total Sleep | Deep Sleep | Light Sleep |\n", "|------|-------------|------------|-------------|\n"]
        seen = set()
        for table in run_query(client, flux_summary):
            for r in table.records:
                date  = fmt_date(r.get_time())
                if date in seen:
                    continue
                seen.add(date)
                total = "N/A"
                try:
                    fmt_str = "%Y-%m-%d %H:%M:%S"
                    t_from   = datetime.strptime(r.values["slept_from"], fmt_str)
                    t_to     = datetime.strptime(r.values["slept_to"], fmt_str)
                    in_bed   = int((t_to - t_from).total_seconds() // 60)
                    awake    = awake_by_day.get(date, 0)
                    total    = fmt_min(in_bed - awake)
                except Exception:
                    pass
                deep  = fmt_min(r.values.get("deep_sleep_min"))
                light = fmt_min(r.values.get("rem_sleep_min"))
                lines.append(f"| {date} | {total} | {deep} | {light} |\n")
        write_md("sleep.md", "".join(lines))

    def export_stress(client):
        flux = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r["stress"] == "daily")
      |> filter(fn: (r) => r._field == "mean_stress_level" or r._field == "minimum_stress_level" or r._field == "max_stress_level")
      |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
      |> sort(columns: ["_time"], desc: true)
    '''
        lines = ["# Stress\n\n", "| Date | Avg Stress | Min Stress | Max Stress |\n", "|------|------------|------------|------------|\n"]
        seen = set()
        for table in run_query(client, flux):
            for r in table.records:
                d = fmt_date(r.get_time())
                if d in seen:
                    continue
                seen.add(d)
                lines.append(f"| {d} | {r.values.get('mean_stress_level','N/A')} | {r.values.get('minimum_stress_level','N/A')} | {r.values.get('max_stress_level','N/A')} |\n")
        write_md("stress.md", "".join(lines))

    def export_blood_oxygen(client):
        flux = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r._field == "spo2_level")
      |> aggregateWindow(every: 1d, fn: mean, createEmpty: false)
      |> sort(columns: ["_time"], desc: true)
    '''
        lines = ["# Blood Oxygen (SpO2)\n\n", "| Date | Avg SpO2 (%) |\n", "|------|--------------|\n"]
        for table in run_query(client, flux):
            for r in table.records:
                lines.append(f"| {fmt_date(r.get_time())} | {round(r.get_value(), 1)} |\n")
        write_md("blood_oxygen.md", "".join(lines))

    def export_pai(client):
        flux = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r["PAI_bound"] == "daily")
      |> filter(fn: (r) => r._field == "pai_score" or r._field == "total_pai")
      |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
      |> sort(columns: ["_time"], desc: true)
    '''
        lines = ["# Personal Activity Intelligence (PAI)\n\n", "| Date | Daily PAI | Total PAI |\n", "|------|-----------|-----------|\n"]
        seen = set()
        for table in run_query(client, flux):
            for r in table.records:
                d = fmt_date(r.get_time())
                if d in seen:
                    continue
                seen.add(d)
                lines.append(f"| {d} | {round(r.values.get('pai_score',0),1)} | {round(r.values.get('total_pai',0),1)} |\n")
        write_md("pai.md", "".join(lines))

    def export_activities(client):
        activity_types = ["fast_walking", "slow_walking", "light_activity"]
        # Collect per-session records keyed by (date, activity_type)
        # Each session has a unique _time; aggregate by day
        daily = {}  # date -> {type -> {duration_m, calories, sessions}}
        for atype in activity_types:
            flux = f'''
    from(bucket: "{BUCKET}")
      |> range(start: {RANGE})
      |> filter(fn: (r) => r._measurement == "{MEASUREMENT}" and r.activity_type == "{atype}")
      |> filter(fn: (r) => r._field == "activity_duration_m" or r._field == "calories")
      |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
      |> sort(columns: ["_time"], desc: true)
    '''
            for table in run_query(client, flux):
                for r in table.records:
                    d = fmt_date(r.get_time())
                    if d not in daily:
                        daily[d] = {}
                    if atype not in daily[d]:
                        daily[d][atype] = {"duration_m": 0, "calories": 0, "sessions": 0}
                    daily[d][atype]["duration_m"] += int(r.values.get("activity_duration_m") or 0)
                    daily[d][atype]["calories"]   += int(r.values.get("calories") or 0)
                    daily[d][atype]["sessions"]   += 1

        dates = sorted(daily.keys(), reverse=True)
        lines = [
            "# Daily Activities\n\n",
            "| Date | Fast Walk (min/cal) | Slow Walk (min/cal) | Light Activity (min/cal) | Total Active Min |\n",
            "|------|---------------------|---------------------|--------------------------|------------------|\n",
        ]
        for d in dates:
            def fmt_act(atype):
                a = daily[d].get(atype)
                if not a or a["sessions"] == 0:
                    return "—"
                return f"{a['duration_m']}min / {a['calories']}cal"
            total_min = sum(daily[d].get(t, {}).get("duration_m", 0) for t in activity_types)
            lines.append(f"| {d} | {fmt_act('fast_walking')} | {fmt_act('slow_walking')} | {fmt_act('light_activity')} | {total_min} |\n")
        write_md("activities.md", "".join(lines))

    if __name__ == "__main__":
        os.makedirs(OUTPUT_DIR, exist_ok=True)
        with InfluxDBClient(url=URL, token=TOKEN, org=ORG) as client:
            print("Exporting heart rate..."); export_heart_rate(client)
            print("Exporting steps...");      export_steps(client)
            print("Exporting sleep...");      export_sleep(client)
            print("Exporting stress...");     export_stress(client)
            print("Exporting blood oxygen..."); export_blood_oxygen(client)
            print("Exporting PAI...");        export_pai(client)
            print("Exporting activities..."); export_activities(client)
        print("Done.")
