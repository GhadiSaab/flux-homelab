apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-health
  namespace: monitoring-ns
  labels:
    grafana_dashboard: "1"
data:
  health-overview.json: |
    {
      "title": "Health (Google Health / Fitbit)",
      "uid": "ghealth-overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "time": { "from": "now-90d", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Last Sync",
          "type": "stat",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/index.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "includeByName": { "last_run": true }, "indexByName": {}, "excludeByName": {} } }
          ]
        },
        {
          "id": 2,
          "title": "Daily Steps",
          "type": "barchart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/steps.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "countSum", "destinationType": "number" } ] } }
          ]
        },
        {
          "id": 3,
          "title": "Heart Rate (daily avg/min/max)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/heart-rate.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "date", "destinationType": "time" } ] } }
          ]
        },
        {
          "id": 4,
          "title": "Sleep",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/sleep.json",
              "root_selector": "",
              "columns": []
            }
          ]
        },
        {
          "id": 5,
          "title": "Weight (g)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/weight.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "time", "destinationType": "time" } ] } }
          ]
        },
        {
          "id": 6,
          "title": "Oxygen Saturation (SpO2 %)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "fieldConfig": { "defaults": { "min": 85, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/oxygen-saturation.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "time", "destinationType": "time" } ] } }
          ]
        },
        {
          "id": 7,
          "title": "Heart Rate Variability (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "ghealth-infinity" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "format": "table",
              "url": "http://ghealth-data.health.svc.cluster.local/heart-rate-variability.json",
              "root_selector": "",
              "columns": []
            }
          ],
          "transformations": [
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "time", "destinationType": "time" } ] } }
          ]
        }
      ]
    }
