apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-ns
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring-ns
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: flux-system
  values:
    defaultRules:
      rules:
        kubeControllerManager: false
        kubeScheduler: false
        kubeProxy: false
      disabled:
        KubeSchedulerDown: true
        KubeControllerManagerDown: true
        KubeProxyDown: true
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    grafana:
      admin:
        existingSecret: grafana-admin-secret
        passwordKey: admin-password
      service:
        type: NodePort
        nodePort: 32000
      envFromSecrets:
        - name: grafana-influxdb-secret
    prometheus:
      service:
        type: NodePort
        nodePort: 32090
      prometheusSpec:
        externalUrl: "http://192.168.1.89:32090"
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: discord
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 1h
        receivers:
          - name: discord
            discord_configs:
              - webhook_url: ${DISCORD_WEBHOOK_URL}
          - name: "null"
