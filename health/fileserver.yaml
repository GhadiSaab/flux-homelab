apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghealth-data-server
  namespace: health
  labels:
    app: ghealth-data-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghealth-data-server
  template:
    metadata:
      labels:
        app: ghealth-data-server
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ghealth-data
            readOnly: true
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ghealth-data
  namespace: health
spec:
  selector:
    app: ghealth-data-server
  ports:
    - port: 80
      targetPort: 8080
