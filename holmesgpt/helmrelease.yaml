apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
  namespace: holmesgpt
spec:
  interval: 10m
  chart:
    spec:
      chart: holmes
      sourceRef:
        kind: HelmRepository
        name: robusta
        namespace: holmesgpt
  values:
    additionalEnvVars:
      - name: GEMINI_API_KEY
        valueFrom:
          secretKeyRef:
            name: holmesgpt-secrets
            key: gemini-api-key
    modelList:
      gemma-4-31b:
        api_key: "{{ env.GEMINI_API_KEY }}"
        model: gemini/gemma-4-31b-it
        rpm: 10
        num_retries: 5
        retry_after: 30
    toolsets:
      bash:
        enabled: true
        config:
          builtin_allowlist: extended
          allow:
            - "kubectl apply"
            - "kubectl create"
            - "kubectl delete"
            - "kubectl patch"
            - "kubectl scale"
            - "kubectl set"
            - "kubectl rollout"
            - "kubectl exec"
            - "kubectl cordon"
            - "kubectl uncordon"
            - "kubectl drain"
            - "kubectl label"
            - "kubectl annotate"
      prometheus/metrics:
        enabled: true
        config:
          prometheus_url: http://kube-prometheus-stack-prometheus.monitoring-ns.svc.cluster.local:9090
      loki/logs:
        enabled: true
        description: "Loki log aggregation"
        config:
          loki_url: http://loki.loki.svc.cluster.local:3100
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ConfigMap
              name: custom-toolsets-configmap
            patch: |-
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: custom-toolsets-configmap
              data:
                custom_toolset.yaml: |-
                  toolsets:
                    bash:
                      enabled: true
                      config:
                        builtin_allowlist: extended
                        allow:
                          - kubectl apply
                          - kubectl create
                          - kubectl delete
                          - kubectl patch
                          - kubectl scale
                          - kubectl set
                          - kubectl rollout
                          - kubectl exec
                          - kubectl cordon
                          - kubectl uncordon
                          - kubectl drain
                          - kubectl label
                          - kubectl annotate
                    connectivity_check:
                      enabled: true
                    internet:
                      enabled: true
                    kubernetes/core:
                      enabled: true
                    kubernetes/logs:
                      enabled: true
                    loki/logs:
                      enabled: true
                      description: Loki log aggregation
                      config:
                        loki_url: http://loki.loki.svc.cluster.local:3100
                    prometheus/metrics:
                      enabled: true
                      config:
                        prometheus_url: http://kube-prometheus-stack-prometheus.monitoring-ns.svc.cluster.local:9090
                    robusta:
                      enabled: true
                    runbook:
                      enabled: true
                  mcp_servers: {}
