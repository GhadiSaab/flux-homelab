# Traefik v3 IngressRoute (k3s default). If your cluster runs Traefik v2,
# change the apiVersion to: traefik.containo.us/v1alpha1
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: meetily-backend
  namespace: meetily
spec:
  entryPoints:
    - websecureext
  routes:
    - match: Host(`meetily.gsaab.dev`)
      kind: Rule
      services:
        - name: meetily-backend
          port: 5167
  tls:
    secretName: meetily-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: meetily-web-ui
  namespace: meetily
spec:
  entryPoints:
    - websecureext
  routes:
    - match: Host(`meetily-ui.gsaab.dev`)
      kind: Rule
      services:
        - name: meetily-web-ui
          port: 3119
  tls:
    secretName: meetily-ui-tls
