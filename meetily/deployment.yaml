apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetily-backend
  namespace: meetily
  labels:
    app: meetily-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meetily-backend
  template:
    metadata:
      labels:
        app: meetily-backend
      annotations:
        deploy-time: "2026-05-14T08:22:05Z"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/ghadisaab/meetily-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5167
          env:
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: meetily-secrets
                  key: api-secret-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meetily-secrets
                  key: gemini-api-key
            - name: DATABASE_PATH
              value: /data/meetings.db
          volumeMounts:
            - name: data
              mountPath: /data
            - name: transcript-processor-patch
              mountPath: /app/transcript_processor.py
              subPath: transcript_processor.py
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meetily-data
        - name: transcript-processor-patch
          configMap:
            name: meetily-transcript-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetily-web-ui
  namespace: meetily
  labels:
    app: meetily-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meetily-web-ui
  template:
    metadata:
      labels:
        app: meetily-web-ui
      annotations:
        deploy-time: "2026-05-14T08:22:05Z"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web-ui
          image: ghcr.io/ghadisaab/meetily-web-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3119
          env:
            - name: BACKEND_URL
              value: http://meetily-backend:5167
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: meetily-secrets
                  key: api-secret-key
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
