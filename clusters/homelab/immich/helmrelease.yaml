apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 1h
  dependsOn:
    - name: cloudnative-pg
      namespace: flux-system
  chart:
    spec:
      chart: immich
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: immich-db-secret
      valuesKey: password
      targetPath: controllers.main.containers.main.env.DB_PASSWORD
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v1.132.3
            env:
              DB_HOSTNAME: "immich-postgres-rw.immich.svc.cluster.local"
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich

    machine-learning:
      enabled: false

    immich:
      persistence:
        library:
          existingClaim: immich-library

    valkey:
      enabled: true
