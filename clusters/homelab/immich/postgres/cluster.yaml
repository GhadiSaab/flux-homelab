apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:pg17-v0.3.0
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-secret
  storage:
    size: 10Gi
