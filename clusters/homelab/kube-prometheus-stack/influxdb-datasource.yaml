apiVersion: v1
kind: ConfigMap
metadata:
  name: influxdb-datasource
  namespace: monitoring-ns
  labels:
    grafana_datasource: "1"
data:
  influxdb-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB
        type: influxdb
        access: proxy
        url: http://influxdb.influxdb.svc.cluster.local:8086
        jsonData:
          version: Flux
          organization: homelab
          defaultBucket: zepp
          tlsSkipVerify: true
        secureJsonData:
          token: ${INFLUXDB_TOKEN}
